<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>404 | Ripper famq — Страница не найдена</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts: Inter + Orbitron -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&family=Orbitron:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #05070c;
            color: #edf2ff;
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        /* Тёмные градиенты и эффекты (как на главной) */
        .bg-cyber {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at 20% 30%, #0f0c1f, #020308);
            z-index: -3;
        }

        .grid-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(80, 60, 160, 0.08) 1px, transparent 1px),
                linear-gradient(90deg, rgba(80, 60, 160, 0.08) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: -2;
        }

        .glow-line {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, #a855f7, #ec4899, #a855f7);
            z-index: 100;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem;
            text-align: center;
            position: relative;
            z-index: 2;
        }

        /* Анимированная цифра 404 */
        .error-code {
            font-family: 'Orbitron', monospace;
            font-size: 10rem;
            font-weight: 800;
            background: linear-gradient(135deg, #e2b0ff, #9f5eff, #ec4899);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 8px;
            text-shadow: 0 0 30px rgba(168,85,247,0.5);
            margin-bottom: 1rem;
            animation: glitch 2s infinite;
        }

        @keyframes glitch {
            0%, 100% { transform: skew(0deg, 0deg); opacity: 1; text-shadow: 0 0 5px #a855f7; }
            95% { transform: skew(0deg, 0deg); opacity: 1; }
            96% { transform: skew(2deg, 1deg); opacity: 0.9; text-shadow: -2px 0 #ec4899, 2px 0 #a855f7; }
            97% { transform: skew(-1deg, -0.5deg); }
            98% { transform: skew(0deg, 0deg); }
        }

        .error-title {
            font-size: 2rem;
            font-weight: 700;
            margin: 1rem 0;
            font-family: 'Orbitron', monospace;
            background: linear-gradient(120deg, #fff, #c084fc);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .error-text {
            color: #b4c0e0;
            font-size: 1.1rem;
            max-width: 550px;
            margin: 0 auto 2rem;
        }

        /* Кнопка возврата в стиле кнопок покупки */
        .btn-home {
            background: linear-gradient(95deg, #7c3aed, #a855f7);
            border: none;
            padding: 1rem 2.2rem;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1.1rem;
            color: white;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: 0.2s;
            text-decoration: none;
            margin-top: 0.5rem;
            box-shadow: 0 5px 15px rgba(168,85,247,0.3);
        }

        .btn-home:hover {
            transform: scale(1.03);
            box-shadow: 0 8px 25px #a855f7;
        }

        /* Блок с контактами (как в футере главной) */
        .footer-contacts-404 {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1.8rem;
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 1px solid rgba(168,85,247,0.2);
            font-size: 0.85rem;
            color: #8e9aaf;
        }

        .footer-contacts-404 a {
            color: #c084fc;
            text-decoration: none;
            transition: 0.2s;
        }

        .footer-contacts-404 a:hover {
            color: #ec4899;
            text-decoration: underline;
        }

        /* Иконка-робот / потерянный элемент */
        .lost-icon {
            font-size: 4rem;
            color: #a855f7;
            opacity: 0.7;
            margin-bottom: 1rem;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
        }

        /* Адаптив */
        @media (max-width: 700px) {
            .error-code {
                font-size: 5rem;
                letter-spacing: 4px;
            }
            .error-title {
                font-size: 1.5rem;
            }
            .container {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>
<div class="bg-cyber"></div>
<div class="grid-overlay"></div>
<div class="glow-line"></div>

<div class="container">
    <div class="lost-icon">
        <i class="fas fa-skull-crossbones"></i>
    </div>
    <div class="error-code">404</div>
    <div class="error-title">Страница не найдена</div>
    <div class="error-text">
        <i class="fas fa-map-marker-alt" style="color:#ec4899;"></i> Похоже, вы забрели в неизведанную часть.<br>
        Такого маршрута нет на карте Ripper famq.
    </div>

    <a href="/" class="btn-home">
        <i class="fas fa-home"></i> Вернуться на главную
    </a>

    <!-- Дополнительные стилизованные ссылки, как в футере -->
    <div class="footer-contacts-404">
        <span><i class="fas fa-tag"></i> Ripper famq majestic rp</span>
        <span><i class="fab fa-discord"></i> Discord: <strong>intelektikk</strong></span>
        <span><i class="fab fa-telegram"></i> Telegram: <a href="https://t.me/owner00811" target="_blank">t.me/owner00811</a></span>
    </div>

    <div style="margin-top: 1.5rem; font-size: 0.75rem; color: #5a6680;">
        <i class="fas fa-robot"></i> Redux • Gunpack • Премиум моды для GTA 5 RP и Majestic RP
    </div>
</div>

<!-- Небольшой скрипт для динамического эффекта (опционально) -->
<script>
    // простая консольная заглушка — никаких ошибок
    console.log("404 page | Ripper famq — возвращайтесь к нам!");
</script>
</body>
</html>
